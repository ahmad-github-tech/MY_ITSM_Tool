# ==========================================
# DATABASE SETTINGS (MySQL Local)
# ==========================================
# 1. Open MySQL Workbench or shell
# 2. Run: CREATE DATABASE supportflow_db;
# 3. Update the password below to match your MySQL root password

spring.datasource.url=jdbc:mysql://localhost:3306/supportflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# SERVER SETTINGS
# ==========================================
server.port=8080
server.servlet.context-path=/supportflow

# Disable Thymeleaf cache for development
spring.thymeleaf.cache=false
