<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SupportFlow - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .card { background-color: #1e293b; border-color: #334155; color: #f8fafc; }
        .sidebar { background-color: #0f172a; border-right: 1px solid #334155; height: 100vh; position: fixed; width: 240px; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .kpi-card { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column p-3">
        <h4 class="mb-4">SupportFlow</h4>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a th:href="@{/}" class="nav-link text-white active" aria-current="page">Dashboard</a>
            </li>
            <li>
                <a th:href="@{/tasks}" class="nav-link text-white">Workbook</a>
            </li>
        </ul>
        <hr>
        <div class="dropdown">
            <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle" id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                <strong>Admin.Support</strong>
            </a>
        </div>
    </div>

    <div class="main-content">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2>SupportFlow Analytics</h2>
            <button class="btn btn-primary">Refresh Data</button>
        </header>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card kpi-card p-3">
                    <small class="text-secondary fw-bold text-uppercase">Total Tickets</small>
                    <h2 th:text="${totalTasks}">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card kpi-card p-3 border-warning">
                    <small class="text-secondary fw-bold text-uppercase">Active Incidents</small>
                    <h2 th:text="${activeTasks}">0</h2>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h5 class="mb-3">Recent Ticket Activities</h5>
            <table class="table table-dark table-hover">
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Project</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Assigned To</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="task : ${tasks}">
                        <td th:text="${task.ticketId}">INC-1001</td>
                        <td th:text="${task.projectId}">Portal</td>
                        <td>
                            <span class="badge bg-danger" th:if="${task.priority == 'P1'}" th:text="${task.priority}"></span>
                            <span class="badge bg-primary" th:unless="${task.priority == 'P1'}" th:text="${task.priority}"></span>
                        </td>
                        <td th:text="${task.status}">Open</td>
                        <td th:text="${task.assignedTo}">User</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
